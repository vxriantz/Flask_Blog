<!-- page extends to template.html -->
{% extends "template.html"%} {% block title %} Create Post {% endblock %}

<!-- home page content -->
{% block content%} 
    
    <h1 align="center">Make a Post</h1> 

    <form method="POST">
        <!-- blog title form -->
        <label for="title">Title</label>
        <input type="text" id="title" name="title" class="form-control" placeholder="Enter Title" />
        <br/>
        <!-- blog post form -->
        <textarea name="content" id="content" class="form-control"></textarea>

    <br/>
    <!-- submit button -->
    <div align="center">
        <button class="btn btn-lg btn-primary" type="submit">Post</button>
    </div>
</form>

{% endblock %}
